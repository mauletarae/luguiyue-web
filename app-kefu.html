<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>客服小九</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;font-family:-apple-system,'PingFang SC','Helvetica Neue',sans-serif;background:#F2F2F7;overflow:hidden;color:#1a1a2e}

.screen{position:fixed;inset:0;display:none;flex-direction:column}
.screen.active{display:flex}

/* status */
.sb{padding:14px 20px 0;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.sb-time{font-size:15px;font-weight:700}
.sb-right{font-size:12px}

/* nav bar */
.navbar{display:flex;align-items:center;padding:8px 16px 10px;flex-shrink:0;border-bottom:1px solid #E5E5EA;background:#F2F2F7}
.nav-icon{width:36px;height:36px;border-radius:10px;background:#E8E8EE;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;flex-shrink:0}
.nav-title{flex:1;text-align:center;font-size:17px;font-weight:700}
.nav-actions{display:flex;gap:8px}

/* ── SCREEN 0: HOME ─── */
#s0{background:#F2F2F7}
.welcome-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 20px 10px;gap:10px}
.bot-icon{width:72px;height:72px;background:linear-gradient(135deg,#3B82F6,#1D6FEF);border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:6px}
.bot-icon svg{width:40px;height:40px}
.welcome-title{font-size:20px;font-weight:800;text-align:center}
.welcome-sub{font-size:13px;color:#8A8A9A;text-align:center;line-height:1.5}

.suggest-label{width:100%;font-size:12px;color:#8A8A9A;margin-bottom:4px}
.suggest-list{width:100%;display:flex;flex-direction:column;gap:1px;background:#E5E5EA;border-radius:14px;overflow:hidden}
.suggest-item{background:#fff;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:background .15s}
.suggest-item:active{background:#F0F0F5}
.suggest-text{font-size:14px;color:#1a1a2e;line-height:1.4}
.suggest-arrow{color:#C7C7CC;font-size:14px;flex-shrink:0}

/* bottom input */
.input-bar{padding:10px 16px 28px;background:#F2F2F7;border-top:1px solid #E5E5EA;display:flex;align-items:center;gap:10px;flex-shrink:0}
.input-icon{width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;flex-shrink:0}
.input-field{flex:1;background:#fff;border-radius:20px;padding:10px 16px;font-size:14px;color:#1a1a2e;border:none;outline:none;font-family:inherit}
.input-field::placeholder{color:#C7C7CC}
.send-btn{width:36px;height:36px;border-radius:50%;background:#3B82F6;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:opacity .2s}
.send-btn:active{opacity:.8}
.send-btn svg{width:16px;height:16px}

/* ── SCREEN 1: CHAT ─── */
#s1{background:#F2F2F7}
.human-banner{background:#EAF2FF;border-bottom:1px solid #D0E4FF;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.hb-left{display:flex;align-items:center;gap:8px}
.hb-avatar{width:28px;height:28px;border-radius:50%;background:#3B82F6;display:flex;align-items:center;justify-content:center;font-size:13px}
.hb-text{font-size:13px;color:#1a5fb0}
.hb-sub{font-size:11px;color:#5a90d0}
.hb-close{color:#C7C7CC;font-size:16px;cursor:pointer}

.chat-body{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.msg{display:flex;gap:10px;max-width:100%}
.msg.bot{align-items:flex-start}
.msg.user{flex-direction:row-reverse}
.msg-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#3B82F6,#1D6FEF);display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff;flex-shrink:0}
.msg-bubble{max-width:72%;padding:12px 14px;border-radius:18px;font-size:14px;line-height:1.6}
.msg.bot .msg-bubble{background:#fff;color:#1a1a2e;border-top-left-radius:4px;box-shadow:0 1px 6px rgba(0,0,0,.06)}
.msg.user .msg-bubble{background:#3B82F6;color:#fff;border-top-right-radius:4px}
.typing{display:flex;gap:5px;align-items:center;padding:14px}
.typing span{width:7px;height:7px;border-radius:50%;background:#C7C7CC;animation:blink 1.2s ease-in-out infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,100%{opacity:.3;transform:scale(1)}50%{opacity:1;transform:scale(1.2)}}

.chip-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px}
.chip{padding:7px 14px;border-radius:16px;background:#EAF2FF;color:#3B82F6;font-size:13px;font-weight:500;border:none;cursor:pointer;transition:background .15s}
.chip:active{background:#D0E4FF}
</style>
</head>
<body>

<!-- Screen 0: Home -->
<div class="screen active" id="s0">
  <div class="sb"><span class="sb-time">18:02</span><span class="sb-right">▌▌▌ ✦ 🔋</span></div>
  <div class="navbar">
    <div class="nav-icon">✏️</div>
    <div class="nav-title">客服小九</div>
    <div class="nav-actions">
      <div class="nav-icon">🕐</div>
      <div class="nav-icon">⚙️</div>
    </div>
  </div>

  <div class="welcome-area">
    <div class="bot-icon">
      <svg viewBox="0 0 40 40" fill="none">
        <circle cx="20" cy="20" r="18" fill="rgba(255,255,255,.15)"/>
        <path d="M12 22 Q14 26 20 26 Q26 26 28 22" stroke="#fff" stroke-width="2" stroke-linecap="round" fill="none"/>
        <circle cx="14" cy="17" r="2.5" fill="#fff"/>
        <circle cx="26" cy="17" r="2.5" fill="#fff"/>
        <path d="M18 12 L20 8 L22 12" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <line x1="20" y1="8" x2="20" y2="6" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
        <circle cx="20" cy="5" r="2" fill="#fff" opacity=".6"/>
        <path d="M8 18 Q5 20 8 22" stroke="#fff" stroke-width="1.5" stroke-linecap="round" fill="none"/>
        <path d="M32 18 Q35 20 32 22" stroke="#fff" stroke-width="1.5" stroke-linecap="round" fill="none"/>
      </svg>
    </div>
    <div class="welcome-title">你好！我是客服小九</div>
    <div class="welcome-sub">可以询问商品信息、活动优惠、<br>订单状态或售后政策</div>
    <div class="suggest-label">你可以问我：</div>
    <div class="suggest-list">
      <div class="suggest-item" onclick="sendQ('VisionPro X1 和 NovaStar S5 哪款更值得买？')"><span class="suggest-text">VisionPro X1 和 NovaStar S5 哪款更值得买？</span><span class="suggest-arrow">›</span></div>
      <div class="suggest-item" onclick="sendQ('夏季焕新节活动有哪些优惠？')"><span class="suggest-text">夏季焕新节活动有哪些优惠？</span><span class="suggest-arrow">›</span></div>
      <div class="suggest-item" onclick="sendQ('如何申请七天无理由退货？')"><span class="suggest-text">如何申请七天无理由退货？</span><span class="suggest-arrow">›</span></div>
      <div class="suggest-item" onclick="sendQ('NovaStar S5 的手写笔怎么用？')"><span class="suggest-text">NovaStar S5 的手写笔怎么用？</span><span class="suggest-arrow">›</span></div>
      <div class="suggest-item" onclick="sendQ('80W 快充多久能充满？')"><span class="suggest-text">80W 快充多久能充满？</span><span class="suggest-arrow">›</span></div>
    </div>
  </div>

  <div class="input-bar">
    <div class="input-icon">🖼️</div>
    <input class="input-field" id="input0" placeholder="输入您的问题..." onkeydown="if(event.key==='Enter')sendFromInput()">
    <button class="send-btn" onclick="sendFromInput()">
      <svg viewBox="0 0 16 16" fill="none"><path d="M2 8 L14 8 M9 3 L14 8 L9 13" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
  </div>
</div>

<!-- Screen 1: Chat -->
<div class="screen" id="s1">
  <div class="sb"><span class="sb-time">18:03</span><span class="sb-right">▌▌▌ ✦ 🔋</span></div>
  <div class="navbar">
    <div class="nav-icon">✏️</div>
    <div class="nav-title">客服小九</div>
    <div class="nav-actions">
      <div class="nav-icon">🕐</div>
      <div class="nav-icon">⚙️</div>
    </div>
  </div>

  <div class="human-banner" id="hbanner" style="display:none">
    <div class="hb-left">
      <div class="hb-avatar">👤</div>
      <div><div class="hb-text">需要人工服务？</div><div class="hb-sub">工作时间 09:00-22:00，人工客服为您服务</div></div>
    </div>
    <span class="hb-close" onclick="document.getElementById('hbanner').style.display='none'">✕</span>
  </div>

  <div class="chat-body" id="chat"></div>

  <div class="input-bar">
    <div class="input-icon">🖼️</div>
    <input class="input-field" id="input1" placeholder="输入您的问题..." onkeydown="if(event.key==='Enter')sendFromChat()">
    <button class="send-btn" onclick="sendFromChat()">
      <svg viewBox="0 0 16 16" fill="none"><path d="M2 8 L14 8 M9 3 L14 8 L9 13" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
  </div>
</div>

<script>
const REPLIES={
  'default':'收到您的问题！正在为您查询相关信息，请稍候～',
  '买':'VisionPro X1 主打专业影音，搭载旗舰芯片，适合重度用户；NovaStar S5 主打日常通勤，80W 快充+超长续航，性价比极高。您更看重哪方面呢？',
  '优惠':'夏季焕新节期间：① 满 3000 减 300；② 以旧换新额外补贴 200 元；③ 指定商品送手环。活动截止 6 月 30 日。',
  '退货':'七天无理由退货申请步骤：\n1. 进入「我的订单」\n2. 选择订单 → 申请售后\n3. 选择「七天无理由」\n4. 填写退货原因并提交\n\n客服将在 2 小时内审核。',
  '手写笔':'NovaStar S5 手写笔使用方法：磁吸充电后即可配对，支持 4096 级压感，在备忘录、绘画等 App 中直接使用即可。首次使用需在设置中开启「手写笔模式」。',
  '快充':'80W 超级快充约 35 分钟可充至 80%，完全充满约需 55 分钟。建议使用原装充电头以获得最佳体验。',
  '人工':'收到！即将为您转接人工客服，当前排队人数约 3 人，预计等待时间 3 分钟。工作时间 09:00-22:00。',
  '投诉':'非常抱歉给您带来了不好的体验！我需要为您转接人工客服处理此事，请稍候。',
};

function getReply(q){
  for(const k of Object.keys(REPLIES)){
    if(k!=='default'&&q.includes(k)) return REPLIES[k];
  }
  return REPLIES.default;
}

function addMsg(text,type){
  const chat=document.getElementById('chat');
  const msg=document.createElement('div');
  msg.className='msg '+type;
  if(type==='bot'){
    msg.innerHTML=`<div class="msg-avatar">九</div><div class="msg-bubble">${text.replace(/\n/g,'<br>')}</div>`;
  } else {
    msg.innerHTML=`<div class="msg-bubble">${text}</div>`;
  }
  chat.appendChild(msg);
  chat.scrollTop=chat.scrollHeight;
}

function addTyping(){
  const chat=document.getElementById('chat');
  const t=document.createElement('div');
  t.className='msg bot';t.id='typing-bubble';
  t.innerHTML=`<div class="msg-avatar">九</div><div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
  chat.appendChild(t);
  chat.scrollTop=chat.scrollHeight;
  return t;
}

function addChips(){
  const chat=document.getElementById('chat');
  const row=document.createElement('div');
  row.className='chip-row';
  [['商品对比','VisionPro X1 和 NovaStar S5 哪款更值得买？'],['退货政策','如何申请七天无理由退货？'],['活动优惠','夏季焕新节活动有哪些优惠？']].forEach(([label,q])=>{
    const c=document.createElement('button');c.className='chip';c.textContent=label;
    c.onclick=()=>{ row.remove(); sendQ(q); };
    row.appendChild(c);
  });
  chat.appendChild(row);
  chat.scrollTop=chat.scrollHeight;
}

let firstMsg=true;
function sendQ(q){
  document.getElementById('s0').classList.remove('active');
  document.getElementById('s1').classList.add('active');
  const chat=document.getElementById('chat');
  if(firstMsg){
    firstMsg=false;
    addMsg('你好！我是客服小九，很高兴为您服务～有什么我能帮助您的？','bot');
  }
  addMsg(q,'user');
  if(q.includes('人工')||q.includes('投诉')) document.getElementById('hbanner').style.display='flex';
  const t=addTyping();
  setTimeout(()=>{
    t.remove();
    addMsg(getReply(q),'bot');
    if(firstMsg===false&&chat.querySelectorAll('.msg').length===3) addChips();
    chat.scrollTop=chat.scrollHeight;
  },1200);
}

function sendFromInput(){
  const inp=document.getElementById('input0');
  const q=inp.value.trim();
  if(q){ inp.value=''; sendQ(q); }
}
function sendFromChat(){
  const inp=document.getElementById('input1');
  const q=inp.value.trim();
  if(q){ inp.value=''; sendQ(q); }
}
</script>
</body>
</html>
